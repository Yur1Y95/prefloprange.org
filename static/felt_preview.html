<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Felt preview — B.1-polish</title>
  <link rel="stylesheet" href="style.css?v=20260529g">
  <style>
    /* Standalone harness only — not part of the app. Uses the real .table-*
       classes from style.css so this shows exactly the live table look. */
    body { background: var(--bg); margin: 0; min-height: 100vh;
           display: flex; flex-direction: column; align-items: center;
           justify-content: center; gap: 18px; font-family: var(--font-ui); }
    .cap { color: var(--text-mid); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
    /* a couple of fake seats + a board so the felt reads in context */
    .demo-board { display: flex; gap: 6px; z-index: 4; }
    .demo-card { width: 46px; height: 66px; border-radius: 6px; background: #fdfeee;
                 box-shadow: 0 2px 8px rgba(0,0,0,.5); }
  </style>
</head>
<body>
  <div class="cap">Felt preview — vivid green · black rail · betting line</div>
  <div class="table-wrap">
    <div class="table-rim"></div>
    <div class="table-felt">
      <div class="pot-block">
        <div class="pot-label">POT</div>
        <div class="pot-value">$9</div>
      </div>
    </div>
  </div>
</body>
</html>
