version: "3.8"

services:
  poker-trainer:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Эти папки монтируются напрямую с твоего компьютера
      # Изменения в файлах видны сразу без пересборки
      - ./data:/app/data
      - ./static:/app/static
      - ./cards:/app/cards
      - ./stats.json:/app/stats.json
      - ./history.json:/app/history.json
      # Python-файлы монтируются для горячей перезагрузки
      - ./main.py:/app/main.py
      - ./drill_engine.py:/app/drill_engine.py
      - ./range_engine.py:/app/range_engine.py
      - ./equity.py:/app/equity.py
      - ./decision.py:/app/decision.py
      - ./postflop_engine.py:/app/postflop_engine.py
      - ./postflop_api.py:/app/postflop_api.py
      - ./equity_api.py:/app/equity_api.py
      - ./srs.py:/app/srs.py
      - ./srs_api.py:/app/srs_api.py
    restart: unless-stopped
